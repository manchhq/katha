name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings
      - name: Test (default features)
        run: cargo nextest run --workspace
      - name: Test (all features)
        run: cargo nextest run --workspace --all-features
      - name: Doctests
        run: cargo test --doc --all-features

  change-risk:
    name: CRAP score (change risk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@just
      - uses: taiki-e/install-action@cargo-binstall
      - name: Install cargo-crap
        run: cargo binstall -y cargo-crap
      # Same recipe used locally; --format github adds inline PR annotations.
      - name: CRAP score (fail above 30)
        run: just crap --format github
