name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    # Postgres service backs the dual-backend integration tests (see
    # KATHA_TEST_PG_URL below); without it those tests run only their SQLite leg.
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: katha
          POSTGRES_PASSWORD: katha
          POSTGRES_DB: katha_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      KATHA_TEST_PG_URL: postgres://katha:katha@localhost:5432/katha_test
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings
      - name: Test (default features)
        run: cargo nextest run --workspace
      - name: Test (all features, SQLite + Postgres)
        run: cargo nextest run --workspace --all-features
      - name: Doctests
        run: cargo test --doc --all-features

  change-risk:
    name: CRAP score (change risk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@just
      - uses: taiki-e/install-action@cargo-binstall
      - name: Install cargo-crap
        # --force: rust-cache can restore cargo's install metadata without the
        # binary, making binstall skip; force guarantees the binary is present.
        run: cargo binstall -y --force cargo-crap
      # Same recipe used locally; --format github adds inline PR annotations.
      - name: CRAP score (fail above 30)
        run: just crap --format github
